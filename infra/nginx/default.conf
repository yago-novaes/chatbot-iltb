# Nginx reverse proxy — HTTPS termination + proxy para app:8000
# Certbot gerencia o bloco ssl_certificate automaticamente.
# Substitua <SEU_DOMINIO> pelo domínio real.

server {
    listen 80;
    server_name <SEU_DOMINIO>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name <SEU_DOMINIO>;

    # Certbot insere as linhas ssl_certificate aqui
    # ssl_certificate /etc/letsencrypt/live/<SEU_DOMINIO>/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/<SEU_DOMINIO>/privkey.pem;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
